version: '3'
services:
  app:
    build:
      context: ./app
    ports:
      - "8080:8080"
    depends_on:
      - db
  db:
    image: postgres:latest
    environment:
      POSTGRES_DB: rinhabackend
      POSTGRES_USER: artsoave
      POSTGRES_PASSWORD: 123456
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
